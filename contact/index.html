                        function onSubmit() {

                                "email": document.getElementById('email').value,
                                "message": document.getElementById('message').value
                            });

                            if(this.readyState === 4) {
                                console.log(this.responseText);
                                alert('Sua mensagem foi enviada, te responderei assim que possível :)');
                                window.location.href = 'https://www.caioruiz.com';
                            }
                            });

                            xhr.open("POST", "https://w77bz7cl4tsxsevmbinz3o3lca0dojtc.lambda-url.us-east-1.on.aws/");
                            xhr.setRequestHeader("Content-Type", "application/json");

                            xhr.send(data);
                        }
